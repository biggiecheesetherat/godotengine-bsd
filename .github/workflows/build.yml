name: Scheduled Auto-Build via Git Clone

on:
  schedule:
    - cron: '0 */12 * * *' # Automatically scans every 12 hours
  workflow_dispatch: # Keeps the manual play button active

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    - name: Compile Godot inside FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        sync: rsync
        prepare: |
          pkg update -f
          pkg install -y scons pkgconf xorg-libraries libxcursor libxi libxinerama libxrandr libxrender alsa-lib pulseaudio mesa-libs libtheora libvorbis git
        run: |
          # Shallow clone the exact version tag branch inside the FreeBSD environment
          git clone --depth 1 --branch master https://github.com/godotengine/godot godot-src
          cd godot-src

          # Low-RAM profile flags optimized to run smoothly on a 2011 Sony Vaio
          scons platform=linuxbsd target=editor arch=x86_64 builtin_vulkan=no optimize=size debug_symbols=no -j$(sysctl -n hw.ncpu)
          
          cd bin
          tar -czf ../../godot-freebsd-opengl3.tar.gz godot.linuxbsd.editor.x86_64

    - name: Deploy Release File
      uses: softprops/action-gh-release@v2
      with:
        tag_name: master
        files: godot-freebsd-opengl3.tar.gz
        name: Godot Engine for FreeBSD 
        body: |
          ### Engine Details
          * Source Code: Compiled from master tree
          * Rendering Fallback: Vulkan modules skipped (`builtin_vulkan=no`)
          
          **Launch Command:** Fire up from your desktop shell using `--rendering-driver opengl3`.
        draft: false
        prerelease: false

    - name: Push to GH Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: master
        files: godot-freebsd-opengl3.tar.gz
        name: Godot Engine for FreeBSD
        body: |
          For changelogs, please read the godot-engine changelog: https://github.com/godotengine/godot/releases
          
          **Execution Note:** Launch via terminal using `--rendering-driver opengl3` on legacy laptops!
        draft: false
        prerelease: false
